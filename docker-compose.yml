version: "3.9"

services:
  app:
    build: .
    container_name: async-api-server
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/reports_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    # Run migrations then start the API
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

  worker:
    build: .
    container_name: async-worker
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/reports_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    # Start the worker (using the build version)
    command: node dist/workers/job.worker.js

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reports_db
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis

volumes:
  postgres-data: