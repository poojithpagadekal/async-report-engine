services:
  app:
    build: .
    container_name: async-api-server
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/reports_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_KEY=${API_KEY}
      - WORKER_SECRET=${WORKER_SECRET}
    stop_grace_period: 30s

  worker:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/reports_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WORKER_SECRET=${WORKER_SECRET}
    command: node dist/workers/worker-server.js
    stop_grace_period: 35s
    deploy:
      replicas: ${WORKER_REPLICAS:-1}

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reports_db
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis

volumes:
  postgres-data:
